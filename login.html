<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Entrar — Innova & AI Studio</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="shared.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;500;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { display: flex; align-items: center; justify-content: center; padding: 24px; }
  .auth-wrap {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 18px; padding: 36px;
    width: 100%; max-width: 420px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.4);
  }
  .auth-brand {
    text-align: center; margin-bottom: 28px;
    font-family: 'Sora', sans-serif;
  }
  .auth-brand .b1 { font-weight: 800; font-size: 22px; letter-spacing: 0.12em; background: linear-gradient(135deg, #ffffff 0%, #b8bfca 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .auth-brand .b-amp { font-weight: 300; font-size: 18px; font-style: italic; color: #6c7589; }
  .auth-brand .b2 { font-weight: 800; font-size: 22px; letter-spacing: 0.18em; color: #fff; }
  .auth-brand .tag { margin-top: 8px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; }
  .auth-wrap h1 { margin: 0 0 6px; font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; }
  .auth-wrap .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .field input {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; font-size: 14px; outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: var(--accent-2); background: var(--bg); }
  .submit-btn {
    width: 100%; background: var(--accent); color: var(--bg);
    border: none; padding: 12px; border-radius: 10px;
    font-weight: 700; font-size: 14px; cursor: pointer;
    transition: all .15s; margin-top: 8px;
  }
  .submit-btn:hover:not(:disabled) { background: var(--accent-2); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .footer-link {
    text-align: center; margin-top: 18px; color: var(--muted); font-size: 13px;
  }
  .footer-link a { color: var(--accent-2); text-decoration: none; }
  .footer-link a:hover { color: #fff; }
  .alert {
    padding: 11px 14px; border-radius: 10px; font-size: 13px;
    margin-bottom: 14px; display: none;
  }
  .alert.error { background: rgba(255,93,108,0.1); border: 1px solid rgba(255,93,108,0.3); color: #ff8094; display: block; }
  .alert.success { background: rgba(54,201,138,0.1); border: 1px solid rgba(54,201,138,0.3); color: var(--ok); display: block; }
  .skip-link { text-align: center; margin-top: 24px; }
  .skip-link a { color: var(--muted); font-size: 12px; text-decoration: none; }
  .skip-link a:hover { color: var(--text); }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-brand">
    <div>
      <span class="b1">INNOVA</span> <span class="b-amp">&amp;</span> <span class="b2">AI</span>
    </div>
    <div class="tag">Studio</div>
  </div>

  <h1>Entrar</h1>
  <div class="sub">Acesse pra sincronizar seu histórico e imagens entre dispositivos.</div>

  <div class="alert" id="alert"></div>

  <form id="loginForm">
    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" required autocomplete="current-password" minlength="6">
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Entrar</button>
  </form>

  <div class="footer-link">
    Não tem conta? <a href="cadastro.html">Criar conta grátis</a>
  </div>

  <div class="skip-link">
    <a href="index.html">← Voltar pro estúdio sem login</a>
  </div>
</div>

<script src="favicon.js"></script>
<script type="module" src="supabase-client.js"></script>
<script type="module">
const $ = id => document.getElementById(id);
const showAlert = (msg, type = 'error') => {
  const a = $('alert');
  a.className = 'alert ' + type;
  a.textContent = msg;
};

// Espera o cliente Supabase ficar pronto (módulos rodam em ordem garantida)
async function waitForSupabase() {
  if (window.supabase) return window.supabase;
  await new Promise(resolve => document.addEventListener('supabase-ready', resolve, { once: true }));
  return window.supabase;
}

(async () => {
  const supabase = await waitForSupabase();
  const { data: { session } } = await supabase.auth.getSession();
  if (session) location.href = 'index.html';
})();

$('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = $('email').value.trim();
  const password = $('password').value;
  const btn = $('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Entrando…';

  try {
    const supabase = await waitForSupabase();
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    showAlert('✓ Logado com sucesso, redirecionando…', 'success');
    setTimeout(() => location.href = 'index.html', 600);
  } catch (e) {
    let msg = e.message || 'Erro ao entrar';
    if (msg.includes('Invalid login')) msg = 'E-mail ou senha incorretos.';
    if (msg.includes('Email not confirmed')) msg = 'Confirma seu e-mail antes de entrar (verifica a caixa de entrada).';
    showAlert(msg);
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});

if (window.lucide) lucide.createIcons();
</script>
</body>
</html>
